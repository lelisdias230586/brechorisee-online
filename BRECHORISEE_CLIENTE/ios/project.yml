name: BRECHORISEECliente
options:
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    DEVELOPMENT_TEAM: "${DEVELOPMENT_TEAM}"
targets:
  BRECHORISEECliente:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.brechorisee.cliente
        PRODUCT_NAME: "BRECHORISEE Cliente"
        INFOPLIST_FILE: Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
schemes:
  BRECHORISEECliente:
    build:
      targets:
        BRECHORISEECliente: all
